<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- iOS 26 Safari paints the Liquid Glass tab bar area from this color, so
         the bar blends into the app (ink-950) instead of the browser default. -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0b0f" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Vibe</title>
    <script>
      // Match the device's color-scheme before paint to avoid a flash.
      try {
        var light = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.className = light ? 'light' : 'dark';
      } catch (e) {
        document.documentElement.className = 'dark';
      }
    </script>
  </head>
  <body class="app-bg">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
